<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OPERATION: FUTURE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#000;
overflow:hidden;
color:white;

}

#background{

position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#1a1a1a,#000);

}

#smoke{

position:absolute;

width:100%;
height:100%;

background:url("https://i.imgur.com/f6Q9QwN.png");

opacity:.08;

animation:smoke 40s linear infinite;

}

@keyframes smoke{

0%{

transform:translateX(0);

}

100%{

transform:translateX(-1000px);

}

}

.content{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

width:90%;

}

.logo{

font-size:24px;

letter-spacing:8px;

color:#d4af37;

margin-bottom:20px;

}

h1{

font-size:80px;

font-weight:900;

margin-bottom:20px;

}

.status{

font-size:18px;

letter-spacing:5px;

color:#999;

margin-bottom:50px;

}

.bar{

width:100%;

height:18px;

background:#222;

border-radius:20px;

overflow:hidden;

}

.progress{

height:100%;

width:10%;

background:#d4af37;

animation:loading 4s infinite;

}

@keyframes loading{

0%{

width:10%;

}

50%{

width:12%;

}

100%{

width:10%;

}

}

.case{

margin-top:60px;

font-size:30px;

letter-spacing:4px;

}

.denied{

margin-top:40px;

font-size:42px;

color:#d4af37;

font-weight:900;

animation:blink 1s infinite;

}

@keyframes blink{

50%{

opacity:.2;

}

}

.small{

margin-top:25px;

font-size:16px;

color:#aaa;

line-height:30px;

}

</style>

</head>

<body>

<div id="background">

<div id="smoke"></div>

</div>

<div class="content">

<div class="logo">

FUTURE × BDZ MOMENTS PHOTO

</div>

<h1>

OPERATION: FUTURE

</h1>

<div class="status">

STATUS: IN PROGRESS

</div>

<div class="bar">

<div class="progress"></div>

</div>

<div class="case">

CASE FILE #001

</div>

<div class="denied">

ACCESS DENIED

</div>

<div class="small">

Próbujesz uzyskać dostęp do materiałów objętych tajemnicą projektu.

<br><br>

Kolejne informacje już wkrótce...

</div>

</div>

</body>

</html>
